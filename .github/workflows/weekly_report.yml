name: PEARL Weekly Report v5.0

on:
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * 5" # Friday 11:05 Cambodia (UTC+7)

permissions:
  contents: read

concurrency:
  group: pearl-weekly-report-v5
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Phnom_Penh
      PEARL_DATA_ROOT: data
      RCLONE_REMOTE_NAME: pearl-drive
      GOOGLE_DRIVE_ROOT: PEARL-News-Archive
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies and rclone
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y rclone

      - name: Configure Google Drive
        env:
          RCLONE_CONFIG_SECRET: ${{ secrets.RCLONE_CONFIG }}
        run: |
          test -n "$RCLONE_CONFIG_SECRET" || { echo "RCLONE_CONFIG secret is missing"; exit 1; }
          mkdir -p "$HOME/.config/rclone"
          printf '%s' "$RCLONE_CONFIG_SECRET" > "$HOME/.config/rclone/rclone.conf"
          chmod 600 "$HOME/.config/rclone/rclone.conf"
          rclone listremotes | grep -Fx "pearl-drive:"

      - name: Validate Python and run tests
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v

      - name: Run weekly report
        run: python pearl_weekly_report.py

      - name: Upload weekly outputs directly to Google Drive
        run: python tools/upload_google_drive.py --workflow weekly

      - name: Keep temporary GitHub artifact fallback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PEARL-weekly-${{ github.run_id }}
          path: |
            data/weekly/**
            data/logs/PEARL_weekly_*
          if-no-files-found: warn
          retention-days: 30
