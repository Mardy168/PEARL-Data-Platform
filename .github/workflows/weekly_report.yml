name: PEARL Weekly Report v4.1

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 5" # Friday 11:00 Cambodia (UTC+7)

permissions:
  contents: read

concurrency:
  group: pearl-weekly-report-v4.1
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Phnom_Penh
      PEARL_DATA_ROOT: data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python and run tests
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v
      - name: Run weekly report
        run: python pearl_weekly_report.py
      - name: Upload weekly outputs
        uses: actions/upload-artifact@v4
        with:
          name: PEARL-weekly-${{ github.run_id }}
          path: |
            data/weekly/**
            data/logs/PEARL_weekly_*
          if-no-files-found: error
          retention-days: 60
