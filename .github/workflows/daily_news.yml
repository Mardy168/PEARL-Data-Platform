name: PEARL Daily News Collection v4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # 09:00 Cambodia (UTC+7)

permissions:
  contents: write

concurrency:
  group: pearl-daily-news-v4
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Phnom_Penh
      PEARL_DATA_ROOT: data
      DAILY_BOUNDARY_HOUR: "9"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python and run tests
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v
      - name: Run daily collector
        run: python pearl_daily_collector.py
      - name: Commit normalized master only
        run: |
          git config user.name "pearl-news-bot"
          git config user.email "pearl-news-bot@users.noreply.github.com"
          git add -f data/master/PEARL_master_news.csv
          if git diff --cached --quiet; then
            echo "Master unchanged; no commit required."
          else
            git commit -m "data: update normalized PEARL master [skip ci]"
            git push
          fi
      - name: Upload daily outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PEARL-daily-${{ github.run_id }}
          path: |
            data/daily/**
            data/qa/**
            data/logs/**
            data/raw_archive/**
            data/master/PEARL_master_news.csv
            data/master_backups/**
          if-no-files-found: warn
          retention-days: 30
