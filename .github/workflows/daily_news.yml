name: PEARL Daily News Collection v5.0

on:
  workflow_dispatch:
  schedule:
    - cron: "5 2 * * *" # 09:05 Cambodia (UTC+7)

permissions:
  contents: write

concurrency:
  group: pearl-daily-news-v5
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TZ: Asia/Phnom_Penh
      PEARL_DATA_ROOT: data
      DAILY_BOUNDARY_HOUR: "9"
      RCLONE_REMOTE_NAME: pearl-drive
      GOOGLE_DRIVE_ROOT: PEARL-News-Archive
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies and rclone
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y rclone
          rclone version

      - name: Configure Google Drive
        env:
          RCLONE_CONFIG_SECRET: ${{ secrets.RCLONE_CONFIG }}
        run: |
          test -n "$RCLONE_CONFIG_SECRET" || { echo "RCLONE_CONFIG secret is missing"; exit 1; }
          mkdir -p "$HOME/.config/rclone"
          printf '%s' "$RCLONE_CONFIG_SECRET" > "$HOME/.config/rclone/rclone.conf"
          chmod 600 "$HOME/.config/rclone/rclone.conf"
          rclone listremotes | grep -Fx "pearl-drive:"

      - name: Validate Python and run tests
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v

      - name: Run daily collector
        run: python pearl_daily_collector.py

      - name: Commit normalized master
        run: |
          git config user.name "pearl-news-bot"
          git config user.email "pearl-news-bot@users.noreply.github.com"
          git add -f data/master/PEARL_master_news.csv
          if git diff --cached --quiet; then
            echo "Master unchanged; no commit required."
          else
            git commit -m "data: update normalized PEARL master [skip ci]"
            git push
          fi

      - name: Upload daily outputs directly to Google Drive
        run: python tools/upload_google_drive.py --workflow daily

      - name: Keep temporary GitHub artifact fallback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PEARL-daily-${{ github.run_id }}
          path: |
            data/daily/**
            data/qa/**
            data/logs/**
            data/raw_archive/**
            data/master/PEARL_master_news.csv
            data/master_backups/**
          if-no-files-found: warn
          retention-days: 14
