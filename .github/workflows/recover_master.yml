name: PEARL Recover Master (Manual Only)

on:
  workflow_dispatch:
    inputs:
      recovery_input_filename:
        description: "Backup CSV uploaded to Drive (review carefully)"
        required: true
        default: "PEARL_master_news_RECOVERY_INPUT.csv"

permissions:
  contents: read

concurrency:
  group: pearl-master-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Recover Master Safely
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_MASTER_FILE_ID: ${{ secrets.GOOGLE_MASTER_FILE_ID }}
          RECOVERY_INPUT_FILENAME: ${{ inputs.recovery_input_filename }}
        run: python tools/recover_master_from_drive.py
