name: PEARL Recover Master (Manual Only)

on:
  workflow_dispatch:
    inputs:
      recovery_input_filename:
        description: "Backup CSV uploaded to the Master folder"
        required: true
        default: "PEARL_master_news_RECOVERY_INPUT.csv"

permissions:
  contents: read

concurrency:
  group: pearl-master-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python syntax
        run: python -m compileall -q .
      - name: Recover Master Safely
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_MASTER_FILE_ID: ${{ secrets.GOOGLE_MASTER_FILE_ID }}
          RECOVERY_INPUT_FILENAME: ${{ inputs.recovery_input_filename }}
        run: python tools/recover_master_from_drive.py
