name: PEARL Monthly Report

on:
  workflow_dispatch:
    inputs:
      report_month:
        description: "Optional completed month in YYYY-MM format"
        required: false
        type: string
  schedule:
    - cron: "0 2 1 * *" # 09:00 Cambodia on first day

permissions:
  contents: read

concurrency:
  group: pearl-monthly-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python syntax
        run: python -m compileall -q .
      - name: Run Monthly Report
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_MASTER_FILE_ID: ${{ secrets.GOOGLE_MASTER_FILE_ID }}
          REPORT_MONTH: ${{ inputs.report_month }}
        run: python pearl_monthly_report.py
