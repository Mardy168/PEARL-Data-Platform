name: PEARL Monthly Report

on:
  workflow_dispatch:
    inputs:
      report_month:
        description: "Optional month in YYYY-MM format"
        required: false
        type: string
  schedule:
    - cron: "0 2 1 * *"  # 09:00 Cambodia, first day of month

concurrency:
  group: pearl-monthly-report
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Monthly Report
        env:
    GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
    GOOGLE_MASTER_FILE_ID: ${{ secrets.GOOGLE_MASTER_FILE_ID }}
        run: python pearl_monthly_report.py
