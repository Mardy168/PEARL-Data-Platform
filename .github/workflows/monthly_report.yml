name: PEARL Monthly Report v4.1

on:
  workflow_dispatch:
    inputs:
      report_month:
        description: "Optional completed month in YYYY-MM format"
        required: false
        type: string
  schedule:
    - cron: "0 2 1 * *" # 09:00 Cambodia on first day of month

permissions:
  contents: read

concurrency:
  group: pearl-monthly-report-v4.1
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Phnom_Penh
      PEARL_DATA_ROOT: data
      REPORT_MONTH: ${{ inputs.report_month }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Python and run tests
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v
      - name: Run monthly report
        run: python pearl_monthly_report.py
      - name: Upload monthly outputs
        uses: actions/upload-artifact@v4
        with:
          name: PEARL-monthly-${{ github.run_id }}
          path: |
            data/monthly/**
            data/logs/PEARL_monthly_*
          if-no-files-found: error
          retention-days: 90
